name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      # 1. Clone the repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Explicitly set up modern Node.js 24 environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. Clean install dependencies based on your package-lock.json
      - name: Install Dependencies
        run: npm ci

      # 4. Compile the Astro project into static HTML/CSS/JS
      - name: Build Project
        run: npm run build

      # 5. Package Astro's default production output directory ('dist') for deployment
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to Live Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 6. Take the uploaded artifact and publish it to your github.io URL
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
